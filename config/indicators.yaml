# Indicator scoring rules.
# Each indicator scores -2..+2 per currency based on YoY (or MoM where noted)
# rate of change of the latest reading vs prior. Higher score = bullish for that currency.
#
# Direction = "up_is_bullish" means rising indicator strengthens currency.
# Direction = "down_is_bullish" means falling indicator strengthens currency
#   (e.g., unemployment rate, jobless claims).
#
# Score logic (default rate-of-change method):
#   +2 if pct_change >= +1 std dev of last N readings
#   +1 if pct_change >  0
#    0 if pct_change == 0
#   -1 if pct_change <  0
#   -2 if pct_change <= -1 std dev
# Then flipped if direction = down_is_bullish.

categories:
  Technical:
    - id: trend
      label: 4H/D Trend
      method: trend_score          # custom: price vs SMA20/50/200 on Daily + 4H
    - id: seasonality
      label: Seasonality
      method: seasonality_score    # custom: same-month historical avg

  Sentiment:
    - id: cot
      label: COT
      method: cot_score            # custom: net positioning + change
    - id: crowd
      label: Crowd Sentiment
      method: retail_score         # contrarian: heavy long crowd = bearish

  Growth:
    - id: gdp
      label: GDP
      direction: up_is_bullish
      lookback_periods: 4    # 4 quarters = 1 year YoY
    - id: mpmi
      label: Manufacturing PMI
      direction: up_is_bullish
      lookback_periods: 12
    - id: spmi
      label: Services PMI
      direction: up_is_bullish
      lookback_periods: 12
    - id: retail_sales
      label: Retail Sales
      direction: up_is_bullish
      lookback_periods: 12
    - id: consumer_conf
      label: Consumer Conf
      direction: up_is_bullish
      lookback_periods: 12

  Inflation:
    - id: cpi
      label: CPI YoY
      direction: up_is_bullish     # rising CPI -> rate hike expectation -> currency strength
      lookback_periods: 12
    - id: ppi
      label: PPI YoY
      direction: up_is_bullish
      lookback_periods: 12
    - id: pce
      label: PCE YoY
      direction: up_is_bullish
      lookback_periods: 12
    - id: rates
      label: Interest Rates
      direction: up_is_bullish
      lookback_periods: 6

  Jobs:
    - id: nfp
      label: NFP
      direction: up_is_bullish
      lookback_periods: 12
    - id: adp
      label: ADP
      direction: up_is_bullish
      lookback_periods: 12
    - id: unemployment_rate
      label: Unemployment Rate
      direction: down_is_bullish
      lookback_periods: 12
    - id: jobless_claims
      label: Unemployment Claims
      direction: down_is_bullish
      lookback_periods: 12
    - id: jolts
      label: JOLTS
      direction: up_is_bullish
      lookback_periods: 12

# Bias label thresholds based on total pair score
bias_thresholds:
  very_bullish: 9
  bullish: 5
  neutral: 4            # |score| < this is neutral
  bearish: -5
  very_bearish: -9

# Currency-row bias thresholds. Currency rows sum fewer cells than pairs
# (no trend/seasonality/crowd), and non-USD fiat rows also carry hard zeros
# in the 5 US-only cells (NFP/ADP/JOLTS/Claims/PCE), so reusing the pair
# thresholds skewed every currency row Neutral. These keep the same
# per-cell fraction as the pair thresholds (bullish 5/18, very 9/18),
# scaled to each row's active cell count. Bearish mirrors negative.
currency_bias_thresholds:
  full:                  # USD + XAU rows: 15 active cells (COT + 14 macro)
    bullish: 4
    very_bullish: 8
  reduced:               # other fiat rows: 10 active cells (US-only cells always 0)
    bullish: 3
    very_bullish: 5

# PPI magnitude scoring (prototype, behind a flag). Default OFF preserves the
# sign-only +-1 behaviour. When enabled, each currency's PPI cell scores by
# surprise SIZE (+-2 / +-1 / 0) instead of sign, and TE-sourced currencies
# (USD/EUR/JPY/CAD) score against the analyst forecast (TEForecast) instead of
# consensus. Calibrated 2026-06-21 against EdgeFinder's PPI cells: this config
# reproduced EURUSD/USDJPY/USDCAD/CADCHF/EURCHF 5/5 (NZDCHF excluded as a
# suspected stale EF reading). See scripts/proto_ppi_magnitude.py. Env override:
# VECTOR_PPI_MAGNITUDE=1/0 forces enabled on/off. NB: thresholds are fit to one
# snapshot; validate across more dates before trusting the exact 0.45/0.70 split.
ppi_magnitude:
  enabled: false
  t0_pp: 0.45            # |surprise| <= t0 -> 0 (neutral deadband, percentage points)
  t1_pp: 0.70            # t0 < |surprise| <= t1 -> +-1 ; > t1 -> +-2
  te_use_forecast: true  # TE ccys score vs TEForecast not consensus
