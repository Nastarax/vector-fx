  # Commodities (1)
  # Gold. Safe-haven precious metal: inverts all US macro. Empty quote =
  # absolute scores (gold's own +-1 cells), not an XAU-USD diff, matching
  # EdgeFinder and the other metals/indices below.
  - symbol: XAUUSD
    base: XAU
    quote: ""
    yf_ticker: "GC=F"

  # Indices (2). Standalone instruments: empty quote means macro cells use the
  # index's own scores directly (no base-quote diff), matching EdgeFinder's
  # absolute index presentation.
  - symbol: NIKKEI
    base: NKY
    quote: ""
    yf_ticker: "^N225"
  # NASDAQ-100 (US equity index). Risk-on US-macro mapping: growth + jobs mirror
  # USD un-inverted, inflation inverted, rates from the US 2Y yield. COT from the
  # CME "NASDAQ MINI" (E-mini Nasdaq-100) Legacy report. yfinance ^NDX = cash index.
  - symbol: NASDAQ
    base: NDX
    quote: ""
    yf_ticker: "^NDX"

  # FTSE 100 (UK equity index). Risk-on UK-macro mapping via GBP cells: growth +
  # jobs mirror GBP un-inverted, inflation inverted, rates from the 2Y yield. No
  # CFTC COT feed, so COT/crowd stay neutral. yfinance ^FTSE = cash index.
  - symbol: UK100
    base: UKX
    quote: ""
    yf_ticker: "^FTSE"

  # DAX 40 (German equity index). Risk-on EUR-macro mapping via EUR cells (same
  # pattern as UK100<-GBP): growth + jobs mirror EUR un-inverted, inflation
  # inverted, rates from the 2Y yield. No CFTC COT feed, so COT/crowd stay
  # neutral. EdgeFinder uses eurozone aggregates (e.g. -17.7 consumer confidence,
  # 6.30% unemployment), which are exactly EUR's cells. yfinance ^GDAXI = cash index.
  - symbol: DAX
    base: DAXI
    quote: ""
    yf_ticker: "^GDAXI"

  # Platinum. Industrial precious metal: pro-cyclical growth/jobs, inverted
  # inflation/rates. Empty quote = absolute scores, matching EdgeFinder.
  - symbol: PLATINUM
    base: XPT
    quote: ""
    yf_ticker: "PL=F"

  # Silver. Safe-haven precious metal (like Gold): inverts all US macro.
  # Empty quote = absolute scores, matching EdgeFinder.
  - symbol: SILVER
    base: XAG
    quote: ""
    yf_ticker: "SI=F"

# Currencies covered
currencies: [USD, EUR, GBP, JPY, CHF, AUD, CAD, NZD, XAU]
