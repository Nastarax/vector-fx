name: Refresh EdgeFinder

on:
  schedule:
    # Every 30 minutes (:05 and :35 UTC). GitHub cron is best-effort and
    # often fires several minutes late, especially at the top of the hour.
    - cron: "5,35 * * * *"
  workflow_dispatch:  # Allows manual run from the Actions tab

permissions:
  contents: write   # Needed to commit refreshed outputs back to repo
  pages: write
  id-token: write

# Serialize runs so a scheduled refresh can't overlap a manual one. Don't
# cancel an in-progress run (we don't want to interrupt a deploy mid-flight).
concurrency:
  group: refresh-deploy
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EdgeFinder pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # WATCH-flip alert channels (optional; unset secrets = console only)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Copy output to index.html for Pages
        run: cp data/output.html data/index.html

      - name: Commit updated data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cache/score_history.json \
                  data/cache/setup_state.json \
                  data/cache/te_history.json \
                  data/cache/te_rates_outlook.json \
                  data/cache/ff_history.json \
                  data/cache/abs_au_household.json \
                  data/cache/myfxbook_outlook.json \
                  data/cache/forexbenchmark_outlook.json \
                  data/output.html data/index.html \
                  data/cot.html data/scorecard.html \
                  data/economic_heatmap.html data/inflation.html \
                  data/seasonality_yearly.html data/seasonality_monthly.html \
                  data/macro.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Hourly refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          # A manual push (e.g. code changes) can land on main while this job
          # runs, which would make a bare `git push` fail with "fetch first".
          # Rebase our data-only commit on top of the new main, preferring our
          # freshly generated outputs on any data-file conflict (-X theirs =
          # the commit being replayed, i.e. ours), then retry a few times.
          n=0
          until git push; do
            n=$((n + 1))
            if [ "$n" -ge 5 ]; then
              echo "Push still failing after $n attempts." >&2
              exit 1
            fi
            echo "Push rejected; rebasing on latest main (attempt $n)..."
            git fetch origin main
            git rebase -X theirs origin/main || git rebase --abort
            sleep $((RANDOM % 4 + 2))
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: data

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
