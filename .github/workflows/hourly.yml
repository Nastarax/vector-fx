name: Refresh EdgeFinder

on:
  schedule:
    # Nominally every 15 minutes, on off-peak minutes. GitHub's scheduler is
    # best-effort and DROPS most events for free-tier repos (observed
    # 2026-06-10: a 30-min cron fired ~5 times in 12 hours). A denser cron on
    # uncrowded minutes is the lottery-ticket workaround; actual cadence will
    # land somewhere between 15 min and a couple of hours. The concurrency
    # group below serializes any pile-ups.
    - cron: "3,18,33,48 * * * *"
  workflow_dispatch:  # Allows manual run from the Actions tab

permissions:
  contents: write   # Needed to commit refreshed outputs back to repo
  pages: write
  id-token: write

# Serialize runs so a scheduled refresh can't overlap a manual one. Don't
# cancel an in-progress run (we don't want to interrupt a deploy mid-flight).
concurrency:
  group: refresh-deploy
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Expose the unblocker key at job level so the refresh step's `if:` can gate
    # on it. Unset (no secret) -> the Investing/Myfxbook refresh step is skipped
    # and behaviour is exactly as before (caches refreshed from the laptop).
    env:
      SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      SCRAPER_PROVIDER: ${{ secrets.SCRAPER_PROVIDER }}
      SCRAPER_PREMIUM: ${{ secrets.SCRAPER_PREMIUM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Cloudflare-blocked sources (Investing.com + Myfxbook). Only runs when the
      # SCRAPER_API_KEY secret is set: it routes those fetchers through a scraping
      # API (residential IP + Cloudflare solve), so Actions can refresh them
      # without the laptop. Calendar-gated (--due) so it fetches only cells whose
      # release window has passed; most runs fetch nothing. Best-effort: a failure
      # here must not block the pipeline (main.py still renders from cache).
      - name: Refresh Cloudflare-blocked sources (Investing/Myfxbook)
        if: ${{ env.SCRAPER_API_KEY != '' }}
        continue-on-error: true
        run: python scripts/refresh_investing.py --due

      - name: Run EdgeFinder pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # WATCH-flip alert channels (optional; unset secrets = console only)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Copy output to index.html for Pages
        run: cp data/output.html data/index.html

      - name: Commit updated data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage everything: .gitignore's curated whitelist already decides
          # what is committable, and a hand-maintained list here kept missing
          # newly added cache files (setup_state.json, ff_rates_outlook.json),
          # which also left unstaged changes that broke the rebase retry below.
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Hourly refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          # A manual push (e.g. code changes) can land on main while this job
          # runs, which would make a bare `git push` fail with "fetch first".
          # Rebase our data-only commit on top of the new main, preferring our
          # freshly generated outputs on any data-file conflict (-X theirs =
          # the commit being replayed, i.e. ours), then retry a few times.
          n=0
          until git push; do
            n=$((n + 1))
            if [ "$n" -ge 5 ]; then
              echo "Push still failing after $n attempts." >&2
              exit 1
            fi
            echo "Push rejected; rebasing on latest main (attempt $n)..."
            git fetch origin main
            # Drop any unstaged regenerated files; rebase refuses a dirty
            # tree, and everything here is reproducible output anyway.
            git checkout -- . || true
            git rebase -X theirs origin/main || git rebase --abort || true
            sleep $((RANDOM % 4 + 2))
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: data

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
