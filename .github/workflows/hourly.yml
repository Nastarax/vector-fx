name: Refresh EdgeFinder

on:
  schedule:
    # Every hour at :05 past. UTC.
    - cron: "5 * * * *"
  workflow_dispatch:  # Allows manual run from the Actions tab

permissions:
  contents: write   # Needed to commit refreshed outputs back to repo
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EdgeFinder pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python main.py

      - name: Copy output to index.html for Pages
        run: cp data/output.html data/index.html

      - name: Commit updated data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cache/score_history.json \
                  data/cache/te_history.json \
                  data/cache/te_rates_outlook.json \
                  data/cache/ff_history.json \
                  data/cache/abs_au_household.json \
                  data/cache/myfxbook_outlook.json \
                  data/cache/forexbenchmark_outlook.json \
                  data/output.html data/index.html \
                  data/cot.html data/scorecard.html \
                  data/economic_heatmap.html data/inflation.html \
                  data/seasonality_yearly.html data/seasonality_monthly.html \
                  data/macro.html
          git diff --cached --quiet || git commit -m "Hourly refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: data

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
